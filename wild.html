<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethiopian Wildlife - EthioTravel AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Manual Scroll Wrapper */
        .main-scroll-wrapper {
            height: 100vh;
            margin-left: 60px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .main-scroll-wrapper::-webkit-scrollbar { display: none; }

        .header-section {
            padding: 100px 20px 40px;
            text-align: center;
        }
        .header-section h1 { color: #ffca28; font-size: 2.5rem; margin-bottom: 10px; }

        /* 2-Column Grid */
        .wild-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 20px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .animal-card {
            background: #111; border-radius: 15px; overflow: hidden;
            border: 1px solid #222; transition: 0.3s;
            cursor: pointer;
        }
        .animal-card:hover { border-color: #ffca28; transform: translateY(-5px); }
        .animal-card img { width: 100%; height: 220px; object-fit: cover; }
        
        .animal-preview { padding: 15px; text-align: center; }
        .animal-preview h3 { margin: 0; color: #fff; font-size: 1.1rem; }

        /* Expandable Details */
        .details-pane {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            background: #1a1a1a;
            padding: 0 15px;
        }
        .animal-card.expanded .details-pane {
            max-height: 500px;
            padding: 20px 15px;
            border-top: 2px solid #ffca28;
        }

        .loc-tag { color: #ffca28; font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .desc-text { font-size: 0.85rem; color: #ccc; line-height: 1.5; margin: 0; }

        .explore-btn {
            background: #ffca28; color: #000; border: none; padding: 10px;
            border-radius: 5px; font-weight: bold; margin-top: 10px; width: 100%;
            cursor: pointer;
        }

        /* Sidebar & Chat Box Consistency */
        .sidebar.collapsed { width: 60px; }
        #sidebar { z-index: 1001; }
        .ai-chat-wrapper { z-index: 3000; }

        @media (max-width: 768px) {
            .wild-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="sidebar collapsed" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="animal.html" style="color:#ffca28"><i class="fas fa-paw"></i><span class="link-text">Wildlife</span></a></li>
        </ul>
    </nav>

    <div class="main-scroll-wrapper">
        <div class="header-section">
            <h1>Ethiopian Wildlife</h1>
            <p>20 Unique Species • Manual Exploration</p>
        </div>

        <div class="wild-grid" id="wildGrid">
            </div>
    </div>

    <div class="ai-chat-wrapper">
        <div class="chat-toggle" onclick="toggleChat()"><i class="fa-solid fa-robot"></i></div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header"><span>Wildlife Guide AI</span></div>
            <div class="chat-content" id="chatContent">
                <div class="ai-msg">Ameseginalehu! Click any card to see where these animals live.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Ask about Bale, Simien...">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const animalData = [
            {n:"Walia Ibex", l:"Simien Mountains", d:"A rare mountain goat with massive horns, capable of climbing vertical cliffs.", i:"https://images.unsplash.com/photo-1590012357732-84562098656d"},
            {n:"Ethiopian Wolf", l:"Bale Mountains", d:"The rarest canid in the world, living in alpine moorlands and hunting giant mole-rats.", i:"https://images.unsplash.com/photo-1543350317-0630737a2ccb"},
            {n:"Gelada Baboon", l:"Simien Highlands", d:"The 'Bleeding Heart' monkey. They are the only primates that primarily eat grass.", i:"https://images.unsplash.com/photo-1518544801976-3e159e50e5bb"},
            {n:"Mountain Nyala", l:"Bale Mountains", d:"A spiral-horned antelope native to the high-altitude heath and woodland.", i:"https://images.unsplash.com/photo-1574870111867-089730e5a7ce"},
            {n:"Abyssinian Lion", l:"Harenna Forest", d:"Distinguished by its dark, black mane. A symbol of national pride.", i:"https://images.unsplash.com/photo-1614027164847-1b2809eb189d"},
            {n:"Menelik's Bushbuck", l:"Shoa/Bale Forests", d:"A shy, dark-maned antelope found in dense highland thickets.", i:"https://images.unsplash.com/photo-1516627145497-ae6968895b74"},
            {n:"Bale Monkey", l:"Harenna Forest", d:"A bamboo-specialist monkey with a white beard and localized habitat.", i:"https://images.unsplash.com/photo-1540573133985-87b6da6d54a9"},
            {n:"Swayne's Hartebeest", l:"Senkele Sanctuary", d:"A unique, chocolate-colored antelope native to the Ethiopian Rift Valley.", i:"https://images.unsplash.com/photo-1518114140033-02f43c8d1678"},
            {n:"Somali Wild Ass", l:"Danakil Desert", d:"One of the most endangered equines, known for its zebra-striped legs.", i:"https://images.unsplash.com/photo-1551009175-8a68da93d5f9"},
            {n:"Grevy's Zebra", l:"Alledeghi Plains", d:"The largest wild equid, featuring very narrow stripes and large ears.", i:"https://images.unsplash.com/photo-1501705388883-4ed8a543392c"},
            {n:"Black Crowned Crane", l:"Lake Tana", d:"A majestic bird found near wetlands, sporting a golden feather crown.", i:"https://images.unsplash.com/photo-1574068468668-a05a11f871da"},
            {n:"Hamadryas Baboon", l:"Awash National Park", d:"Sacred baboons known for the large silver capes of the males.", i:"https://images.unsplash.com/photo-1534351590666-13e3e96b5017"},
            {n:"Abyssinian Ground Hornbill", l:"Omo Valley", d:"A large, ground-dwelling bird with a striking red throat pouch.", i:"https://images.unsplash.com/photo-1512103855015-6899709291f0"},
            {n:"Nile Crocodile", l:"Lake Chamo", d:"Massive reptiles that congregate in the 'Crocodile Market' of Arba Minch.", i:"https://images.unsplash.com/photo-1549240923-93a2e080e653"},
            {n:"Oryx Beisa", l:"Awash Park", d:"Elegant antelopes with long, spear-like horns adapted for dry savannahs.", i:"https://images.unsplash.com/photo-1512411425164-90409a80436d"},
            {n:"Spotted Hyena", l:"Harar / Night Market", d:"Famously fed by hand in Harar; they play a key role in the ecosystem.", i:"https://images.unsplash.com/photo-1591824438708-ce405f36ba3d"},
            {n:"Greater Kudu", l:"Nechisar Park", d:"Renowned for their massive twisting horns and forest camouflage.", i:"https://images.unsplash.com/photo-1516734212186-a967f81ad0d7"},
            {n:"African Elephant", l:"Babile Elephant Sanctuary", d:"The largest land mammal, found in the semi-arid valleys of the east.", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46"},
            {n:"Leopard", l:"Various National Parks", d:"The most elusive of the big cats, often found in highland forests.", i:"https://images.unsplash.com/photo-1516426122078-c23e76319801"},
            {n:"Flamingo", l:"Lake Abijatta", d:"Vibrant pink birds that gather in thousands in the Rift Valley lakes.", i:"https://images.unsplash.com/photo-1506108163997-f0473214aa1b"}
        ];

        const grid = document.getElementById('wildGrid');

        // Render the 20 Unique Cards
        animalData.forEach((animal, index) => {
            grid.innerHTML += `
                <div class="animal-card" onclick="this.classList.toggle('expanded')">
                    <img src="${animal.i}?auto=format&fit=crop&q=60&w=500&sig=${index}" alt="${animal.n}">
                    <div class="animal-preview">
                        <h3>${animal.n}</h3>
                        <button class="explore-btn">Explore</button>
                    </div>
                    <div class="details-pane">
                        <span class="loc-tag"><i class="fas fa-map-pin"></i> ${animal.l}</span>
                        <p class="desc-text">${animal.d}</p>
                    </div>
                </div>
            `;
        });

        // UI Helpers
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatContent = document.getElementById('chatContent');
            if(!input.value.trim()) return;
            chatContent.innerHTML += `<div class="user-msg" style="text-align:right; margin:10px; color:#ffca28;">You: ${input.value}</div>`;
            input.value = '';
            chatContent.scrollTop = chatContent.scrollHeight;
        }
    </script>
</body>
</html>
