<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ethiopian Drinks - EthioTravel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ethio-green: #2e7d32;
            --ethio-yellow: #ffca28;
            --ethio-red: #f44336;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background: #000; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            color: white; 
        }
        
        /* SIDEBAR (Original Style Preserved) */
        #sidebar { 
            z-index: 2000; 
            transition: 0.5s ease; 
            width: 250px; 
            position: fixed; 
            left: 0; top: 0; 
            height: 100vh; 
            background: linear-gradient(180deg, var(--ethio-green) 0%, var(--ethio-yellow) 50%, var(--ethio-red) 100%); 
        }
        #sidebar.collapsed { width: 70px; }
        .nav-links { list-style: none; padding: 80px 0 0 0; margin: 0; }
        .nav-links li a { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #000; text-decoration: none; font-weight: bold; transition: 0.3s; 
        }
        .nav-links li a:hover { background: rgba(0,0,0,0.15); }
        .link-text { margin-left: 20px; transition: 0.3s; }
        #sidebar.collapsed .link-text { opacity: 0; pointer-events: none; }
        .toggle-btn { position: absolute; top: 25px; left: 23px; cursor: pointer; font-size: 1.5rem; color: #000; }

        /* CONTENT WRAPPER */
        .content-wrapper { 
            margin-left: 250px; 
            height: 100vh; 
            transition: 0.5s ease; 
            display: flex; 
            flex-direction: column;
            background: #000;
        }
        #sidebar.collapsed ~ .content-wrapper { margin-left: 70px; }

        /* SEARCH SECTION */
        .search-container {
            padding: 20px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
        }
        .search-box {
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 40px;
            border-radius: 25px;
            border: 1px solid var(--ethio-green);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 15px;
            color: var(--ethio-yellow);
        }

        /* GRID: 2 ROWS, 2 COLUMNS (4 VISIBLE) */
        .place-grid {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: calc(44vh - 20px); 
            gap: 15px;
            scroll-snap-type: y mandatory;
        }

        .place-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            scroll-snap-align: start;
            transition: transform 0.3s;
        }
        .place-card:hover { transform: scale(1.02); border-color: var(--ethio-yellow); }

        .place-img { width: 45%; height: 100%; object-fit: cover; }
        .place-info { 
            padding: 15px; width: 55%; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .place-info h3 { color: var(--ethio-yellow); margin: 0 0 5px 0; font-size: 1.1rem; text-transform: uppercase; }
        .place-info span { color: var(--ethio-green); font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; display: block;}
        .place-info p { font-size: 0.75rem; opacity: 0.8; margin: 0; line-height: 1.3; }

        .chat-toggle { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 55px; height: 55px; background: var(--ethio-red); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 3000; 
        }

        @media (max-width: 768px) {
            .place-grid { grid-template-columns: 1fr; grid-auto-rows: calc(45vh - 30px); }
            .content-wrapper { margin-left: 0; }
            #sidebar { left: -250px; }
            #sidebar.active { left: 0; }
        }
    </style>
</head>

        const grid = document.getElementById('grid');

        function initDrinks(data = drinkData) {
            grid.innerHTML = "";
            data.forEach((drink) => {
                const card = document.createElement('div');
                card.className = 'place-card';
                card.innerHTML = `
                    <img src="${drink.i}" class="place-img" alt="${drink.n}">
                    <div class="place-info">
                        <span>${drink.t}</span>
                        <h3>${drink.n}</h3>
                        <p>${drink.d}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterDrinks() {
            const query = document.getElementById('drinkSearch').value.toLowerCase();
            const filtered = drinkData.filter(d => 
                d.n.toLowerCase().includes(query) || 
                d.t.toLowerCase().includes(query)
            );
            initDrinks(filtered);
        }

        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            if (window.innerWidth <= 768) sb.classList.toggle('active');
        }

        initDrinks();
    </script>
