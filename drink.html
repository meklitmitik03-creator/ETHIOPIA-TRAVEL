<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethiopian Drinks - EthioTravel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ethio-green: #2e7d32;
            --ethio-yellow: #ffca28;
            --ethio-red: #f44336;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background: #000; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            color: white; 
        }
        
        /* SIDEBAR WITH ETHIOPIAN FLAG GRADIENT */
        #sidebar { 
            z-index: 2000; 
            transition: 0.5s ease; 
            width: 250px; 
            position: fixed; 
            left: 0; top: 0; 
            height: 100vh; 
            background: linear-gradient(180deg, var(--ethio-green) 0%, var(--ethio-yellow) 50%, var(--ethio-red) 100%); 
        }
        #sidebar.collapsed { width: 70px; }
        .nav-links { list-style: none; padding: 80px 0 0 0; margin: 0; }
        .nav-links li a { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #000; text-decoration: none; font-weight: bold; transition: 0.3s; 
        }
        .nav-links li a:hover { background: rgba(0,0,0,0.15); }
        .link-text { margin-left: 20px; transition: 0.3s; }
        #sidebar.collapsed .link-text { opacity: 0; pointer-events: none; }
        .toggle-btn { position: absolute; top: 25px; left: 23px; cursor: pointer; font-size: 1.5rem; color: #000; }

        /* CONTENT WRAPPER */
        .content-wrapper { 
            margin-left: 250px; 
            height: 100vh; 
            transition: 0.5s ease; 
            display: flex; 
            flex-direction: column;
            background: #000;
        }
        #sidebar.collapsed ~ .content-wrapper { margin-left: 70px; }

        /* GRID: EXACTLY 4 CARDS VISIBLE (2x2) */
        .place-grid {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: calc(45vh - 20px); 
            gap: 15px;
            scroll-snap-type: y mandatory;
        }

        .place-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            scroll-snap-align: start;
            transition: transform 0.3s;
        }
        .place-card:hover { transform: scale(1.02); border-color: var(--ethio-yellow); }

        .place-img { width: 45%; height: 100%; object-fit: cover; }
        .place-info { 
            padding: 15px; width: 55%; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .place-info h3 { color: var(--ethio-yellow); margin: 0 0 5px 0; font-size: 1.1rem; text-transform: uppercase; }
        .place-info span { color: var(--ethio-green); font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; display: block;}
        .place-info p { font-size: 0.75rem; opacity: 0.8; margin: 0; line-height: 1.3; }

        /* AI Chat Button */
        .chat-toggle { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 55px; height: 55px; background: var(--ethio-red); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 3000; 
        }

        @media (max-width: 768px) {
            .place-grid { grid-template-columns: 1fr; grid-auto-rows: calc(45vh - 30px); }
            .content-wrapper { margin-left: 0; }
            #sidebar { left: -250px; }
            #sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar collapsed" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="#"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="#"><i class="fas fa-utensils"></i><span class="link-text">Food</span></a></li>
            <li><a href="#" style="color:#000"><i class="fas fa-glass-cheers"></i><span class="link-text">Drinks</span></a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <main class="place-grid" id="grid"></main>
    </div>

    <div class="chat-toggle"><i class="fa-solid fa-robot"></i></div>

    <script>
        const drinkData = [
            { n: "Buna", t: "Coffee", d: "Traditional Ethiopian coffee, the heart of social life.", i: "fa-mug-hot" },
            { n: "Tej", t: "Honey Wine", d: "Potent honey wine fermented with Gesho leaves.", i: "fa-glass-whiskey" },
            { n: "Tella", t: "Traditional Beer", d: "Traditional highland beer brewed from barley or corn.", i: "fa-beer" },
            { n: "Areke", t: "Spirit", d: "A powerful grain-distilled spirit, often spiced.", i: "fa-flask" },
            { n: "Birz", t: "Sweet Water", d: "Sweet, non-alcoholic honey water refreshment.", i: "fa-wine-glass-alt" },
            { n: "Bulla", t: "Traditional Drink", d: "A thick, nutritious drink made from Enset root.", i: "fa-glass-whiskey" },
            { n: "Shai", t: "Spiced Tea", d: "Strong black tea served with cinnamon and cloves.", i: "fa-leaf" },
            { n: "Kuti", t: "Leaf Tea", d: "Tea made from roasted coffee leaves.", i: "fa-mug-saucer" },
            { n: "Keribo", t: "Fermented Barley", d: "Non-alcoholic fermented drink made from roasted barley.", i: "fa-glass-martini-alt" },
            { n: "Keneto", t: "Barley Drink", d: "A light, refreshing barley-based traditional beverage.", i: "fa-wine-bottle" },
            { n: "Hoja", t: "Coffee Husk", d: "Coffee husk tea, often mixed with milk.", i: "fa-fill-drip" },
            { n: "Spiced Milk", t: "Milk Brew", d: "Fresh milk boiled with ginger and cardamom.", i: "fa-bottle-water" },
            { n: "Borde", t: "Cereal Drink", d: "A thick, cereal-based fermented food-drink.", i: "fa-bowl-rice" },
            { n: "Shameta", t: "Cultural Drink", d: "A traditional thick drink common in the Gurage region.", i: "fa-glass-citrus" },
            { n: "Gesho Juice", t: "Herbal", d: "Bitter herbal infusion used for medicinal properties.", i: "fa-seedling" },
            { n: "Jebena Buna", t: "Ceremonial Coffee", d: "Clay pot brewed coffee with frankincense aroma.", i: "fa-fire-burner" },
            { n: "Honey Shai", t: "Sweet Tea", d: "Traditional tea sweetened with organic highland honey.", i: "fa-honey-pot" },
            { n: "Wild Herb Tea", t: "Herbal Tea", d: "Infusion of Tena Adam and other highland herbs.", i: "fa-mortar-pestle" },
            { n: "Barley Birz", t: "Honey Barley", d: "Barley water sweetened with honey and lemon.", i: "fa-droplet" },
            { n: "Degue", t: "Millet Drink", d: "A fermented millet-based drink from Southern Ethiopia.", i: "fa-wheat-awn" },
            { n: "Filtering Tella", t: "Clear Beer", d: "The clear 'Gere' stage of traditional beer brewing.", i: "fa-filter" },
            { n: "Niter Kibbe Chai", t: "Butter Tea", d: "Special tea with a drop of spiced clarified butter.", i: "fa-hot-cup" },
            { n: "Ginger Shai", t: "Spiced Tea", d: "Strong ginger-infused tea for cold mornings.", i: "fa-wind" },
            { n: "Black Areke", t: "Strong Spirit", d: "Double-distilled powerful traditional spirit.", i: "fa-skull-crossbones" },
            { n: "Spiced Tej", t: "Aged Mead", d: "Aged honey wine with extra herbal spices.", i: "fa-vial-circle-check" },
            { n: "White Tella", t: "Wheat Beer", d: "A lighter version of traditional beer using wheat.", i: "fa-cloud" },
            { n: "Forest Tea", t: "Nature Infusion", d: "Herbal tea sourced from the Harenna forest.", i: "fa-tree" },
            { n: "Lemon Birz", t: "Citrus Refreshment", d: "Traditional honey water with a citrus twist.", i: "fa-lemon" },
            { n: "Dry Areke", t: "Pure Spirit", d: "Unsweetened pure traditional distillation.", i: "fa-droplet-slash" },
            { n: "Royal Tej", t: "Premium Mead", d: "Premium honey wine reserved for special ceremonies.", i: "fa-crown" }
        ];

        const grid = document.getElementById('grid');

        function initDrinks() {
            drinkData.forEach((drink, index) => {
                const card = document.createElement('div');
                card.className = 'place-card';
                card.innerHTML = `
                    <img src="https://picsum.photos/seed/${index+300}/400/500" class="place-img" alt="${drink.n}">
                    <div class="place-info">
                        <span>${drink.t}</span>
                        <h3>${drink.n}</h3>
                        <p>${drink.d}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            if (window.innerWidth <= 768) sb.classList.toggle('active');
        }

        initDrinks();
    </script>
</body>
</html>
