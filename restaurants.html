<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resorts of Ethiopia | EthioTravel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ethio-green: #2e7d32;
            --ethio-yellow: #fcd116;
            --glass: rgba(255, 255, 255, 0.1);
            --sidebar-width: 80px;
        }

        body {
            background: #050a05;
            color: white;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 1000;
            border-right: 1px solid var(--glass);
        }

        .sidebar i {
            font-size: 22px;
            color: #888;
            margin: 25px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--ethio-yellow);
            transform: scale(1.1);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 2.8rem;
            color: var(--ethio-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- GRID --- */
        .park-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- CARD --- */
        .park-card {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .park-card.expanded {
            grid-column: span 2;
            height: 850px; 
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 20%, rgba(0,0,0,0.9) 85%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            z-index: 5;
            transition: 0.4s;
        }

        .park-card.expanded .card-overlay {
            background: rgba(0,0,0,0.92);
            justify-content: flex-start; 
        }

        .description {
            display: none;
            margin: 15px 0;
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
        }

        .expanded .description { display: block; }

        .map-frame {
            display: none;
            width: 100%;
            flex-grow: 1; 
            min-height: 300px;
            margin: 15px 0;
            border-radius: 15px;
            border: 2px solid var(--ethio-green);
            overflow: hidden;
        }

        .map-active .map-frame { display: block; }

        /* --- BUTTONS --- */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto; 
            z-index: 10;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-explore { background: var(--ethio-yellow); color: black; }
        .btn-locate { background: var(--ethio-green); color: white; }
        .btn-book { background: white; color: black; }

        /* --- MODAL FORM --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            inset: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--ethio-yellow);
        }

        .modal-content h2 { color: var(--ethio-yellow); margin-top: 0; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- SUCCESS MESSAGE --- */
        #successMsg {
            display: none;
            text-align: center;
            color: #4caf50;
            font-weight: bold;
            margin-top: 20px;
        }

        @media (max-width: 850px) {
            .park-grid { grid-template-columns: 1fr; }
            .park-card.expanded { grid-column: span 1; }
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fas fa-home"></i>
        <i class="fas fa-umbrella-beach active"></i>
        <i class="fas fa-map-marked-alt"></i>
        <i class="fas fa-images"></i>
    </div>

    <div class="main-content">
        <div class="header-title">
            <h1>Ethiopian Resorts</h1>
            <p style="color: #888;">Luxury, Nature, and Unmatched Serenity</p>
        </div>
        <div class="park-grid" id="parkGrid"></div>
    </div>

    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <h2 id="modalTitle">Book Your Stay</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required id="bookName">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required id="bookEmail">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" required id="bookPhone">
                </div>
                <div class="form-group">
                    <label>Arrival Date</label>
                    <input type="date" required id="bookDate">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="bookPay">
                        <option value="telebirr">Telebirr</option>
                        <option value="cbebirr">CBE Birr</option>
                        <option value="card">Credit/Debit Card</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-explore" style="width:100%">Confirm Booking</button>
                <button type="button" class="btn" style="width:100%; margin-top:10px; background:#444; color:white;" onclick="closeModal()">Cancel</button>
            </form>
            <div id="successMsg">🎉 Booking Successful! Check your email for confirmation.</div>
        </div>
    </div>

    <script>
        const resorts = [
            { name: "Kuriftu Resort & Spa Bishoftu", q: "Kuriftu+Resort+Bishoftu", img: "https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800", desc: "A premier lakeside escape featuring water parks and luxury spa treatments." },
            { name: "Kuriftu Resort & Spa Bahir Dar", q: "Kuriftu+Resort+Bahir+Dar", img: "https://images.unsplash.com/photo-1540518614846-7eded433c457?w=800", desc: "Set on the banks of Lake Tana, offering a perfect blend of history and luxury." },
            { name: "Kuriftu Resort & Spa Langano", q: "Kuriftu+Resort+Langano", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", desc: "Beachfront relaxation on the shores of the golden Lake Langano." },
            { name: "Kuriftu Awash Falls", q: "Kuriftu+Resort+Awash", img: "https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=800", desc: "A unique lodge experience right next to the thundering Awash waterfalls." },
            { name: "Kuriftu Entoto Resort", q: "Kuriftu+Entoto+Adventure+Park", img: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800", desc: "Adventure and luxury high above Addis Ababa in the eucalyptus forests." },
            { name: "Haile Resort Hawassa", q: "Haile+Resort+Hawassa", img: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=800", desc: "Owned by legend Haile Gebrselassie, this lakeside resort offers world-class amenities." },
            { name: "Haile Resort Arba Minch", q: "Haile+Resort+Arba+Minch", img: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800", desc: "Overlooking the majestic lakes Chamo and Abaya in the Rift Valley." },
            { name: "Haile Resort Adama", q: "Haile+Resort+Adama", img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800", desc: "A serene getaway in the heart of the bustling city of Adama." },
            { name: "Haile Resort Gondar", q: "Haile+Resort+Gondar", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800", desc: "Stay near the historic Fasil Ghebbi with modern Ethiopian luxury." },
            { name: "Haile Resort Ziway", q: "Haile+Resort+Ziway", img: "https://images.unsplash.com/photo-1544131418-2b5f65bc7dfc?w=800", desc: "Perfect for bird watching and relaxing by the edge of Lake Ziway." },
            { name: "Sabana Beach Resort", q: "Sabana+Beach+Resort+Langano", img: "https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?w=800", desc: "A rustic yet refined beach experience on Lake Langano's sandy shores." },
            { name: "Bishangari Lodge", q: "Bishangari+Lodge+Langano", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800", desc: "An eco-friendly lodge tucked into a pristine forest by the lake." },
            { name: "Babogaya Lake View Resort", q: "Babogaya+Lake+View+Resort", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800", desc: "Quiet and intimate resort overlooking the circular volcanic Lake Babogaya." },
            { name: "Wenchi Eco Lodge", q: "Wenchi+Crater+Lake+Ethiopia", img: "https://images.unsplash.com/photo-1433086466648-84284d207301?w=800", desc: "Sustainable tourism at its best, inside an extinct volcanic crater." },
            { name: "Adulala Resort & Spa", q: "Adulala+Resort+Bishoftu", img: "https://images.unsplash.com/photo-1540541338287-41700207dee6?w=800", desc: "Elegant rooms and extensive spa services on the rim of Lake Bishoftu." }
        ];

        function createCards() {
            const grid = document.getElementById('parkGrid');
            resorts.forEach((r) => {
                const card = document.createElement('div');
                card.className = 'park-card';
                card.style.backgroundImage = `url('${r.img}')`;
                card.innerHTML = `
                    <div class="card-overlay">
                        <h2>${r.name}</h2>
                        <div class="description">${r.desc}</div>
                        <div class="map-frame">
                            <iframe width="100%" height="100%" frameborder="0" scrolling="no" 
                                src="https://maps.google.com/maps?q=${r.q}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-explore" onclick="toggleExplore(this)">Explore</button>
                            <button class="btn btn-locate" onclick="toggleLocate(this)">Locate</button>
                            <button class="btn btn-book" onclick="openModal('${r.name}')">Book Now</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleExplore(btn) {
            const card = btn.closest('.park-card');
            const isExpanded = card.classList.contains('expanded');
            document.querySelectorAll('.park-card').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded', 'map-active');
                    c.querySelector('.btn-explore').innerText = "Explore";
                }
            });
            if (!isExpanded) {
                card.classList.add('expanded');
                btn.innerText = "Close";
            } else {
                card.classList.remove('expanded', 'map-active');
                btn.innerText = "Explore";
            }
        }

        function toggleLocate(btn) {
            const card = btn.closest('.park-card');
            const isMapActive = card.classList.contains('map-active');
            if (isMapActive) {
                card.classList.remove('map-active', 'expanded');
                card.querySelector('.btn-explore').innerText = "Explore";
            } else {
                card.classList.add('expanded', 'map-active');
                card.querySelector('.btn-explore').innerText = "Close";
            }
        }

        function openModal(name) {
            document.getElementById('modalTitle').innerText = "Reservation at " + name;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('bookingForm').style.display = 'block';
        }

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(closeModal, 3000);
        });

        window.onload = createCards;
    </script>
</body>
</html>
