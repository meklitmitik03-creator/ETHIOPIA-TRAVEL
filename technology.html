<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0, user-scalable=no"> 
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tech & Innovation - Ethiopia AI Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        .bg-slider {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slideBG 25s infinite;
            filter: brightness(0.4);
        }

        @keyframes slideBG {
            0%, 19% { background-image: url('https://media.gettyimages.com/id/1156763312/photo/business-man-working.jpg?s=612x612&w=0&k=20&c=2JH7FDkktgXffOkB3zZunhhqsmdTX4eSOUSZ-L7DQ4w='); }
            20%, 39% { background-image: url('https://media.gettyimages.com/id/944718862/photo/topshot-people-gather-for-the-rally-of-ethiopias-new-prime-minister-in-ambo-about-120km-west.jpg?s=612x612&w=0&k=20&c=_L25YpALT726DfTp2n1TyDphfqAeOtrrD3elvLJXNa4='); }
            40%, 59% { background-image: url('https://media.gettyimages.com/id/1189649217/photo/people-stand-in-front-of-a-luminous-sign-with-the-initials-of-the-ethiopian-remote-sensing.jpg?s=612x612&w=0&k=20&c=cOzRBI1eO3PJcVooI15eb4m_VHDFLLd6sV0oTN02VEo='); }
            60%, 79% { background-image: url('https://media.gettyimages.com/id/1189649213/photo/chinese-and-ethiopian-personnel-work-in-a-monitoring-centre-in-entoto-observatory-and.jpg?s=612x612&w=0&k=20&c=ljZWnc64vt3sSs_6DDSM5sCjLFq1IsqUFmW6DJAYcPs='); }
            80%, 100% { background-image: url('https://media.gettyimages.com/id/1214685571/photo/addis-ababa-ethiopia-industrial-parks-development-corporation-gate-addis-ababa-region-addis.jpg?s=612x612&w=0&k=20&c=eN6072TkXkFwBv1yQTrFJZvyABCV7Ig5Gc2OHhiDQuk='); }
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background: transparent; 
            overflow: hidden;
            transition: padding-left 0.3s ease;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 15px;
            width: 90%;
            max-width: 1000px;
            height: 85vh; 
            overflow-y: auto;
            scrollbar-width: none;
            margin: 0 auto;
        }

        .cards-container::-webkit-scrollbar { display: none; }

        .info-card {
            background: rgba(236, 233, 233, 0.08); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 38vh; 
        }

        .info-card h3 { margin: 0; color: #31db39; font-size: 1.5rem; text-transform: uppercase; }
        .info-card .category-tag { font-size: 0.8rem; color: #ffca28; margin-bottom: 5px; font-weight: bold; }
        .info-card .short-desc { font-size: 0.95rem; font-weight: 500; margin-top: 5px; opacity: 0.9; }
        
        .explore-btn-card {
            background: #ffca28; color: #000; border: none; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .registration-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 10000; backdrop-filter: blur(10px);
        }

        .registration-form {
            background: #1a1a1a; padding: 30px; border-radius: 20px;
            border: 2px solid #31db39; width: 90%; max-width: 400px; color: white; text-align: center;
        }

        .registration-form input {
            width: 100%; padding: 12px; margin: 8px 0; background: #333;
            border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;
        }

        #sidebar:not(.collapsed) ~ main.panel { padding-left: 250px; }

        @media (max-width: 600px) {
            #sidebar:not(.collapsed) ~ main.panel { padding-left: 0; }
            .cards-container { grid-template-columns: 1fr; width: 95%; }
        }
    </style>
</head>

<body>
    <div class="bg-slider"></div>

    <div class="registration-overlay" id="regOverlay">
        <div class="registration-form">
            <h2 id="regTitle">Innovate With Us</h2>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Professional Email" required>
            <input type="text" placeholder="Tech Startup/Org Name" required>
            <input type="text" placeholder="Field of Interest" required>
            <button class="submit-btn" style="background:#ffca28; color:black; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="handleRegister()">CONNECT NOW</button>
            <div id="success-msg" style="display:none; color:#31db39; margin-top:15px;"></div>
        </div>
    </div>

    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#2e7d32; display:flex; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.5s;">
        <div style="text-align:center; color:white;">
            <h1 style="margin:0; font-size:3rem;">🚀</h1>
            <p>EthioTech Innovation</p>
        </div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="tech.html"><i class="fas fa-microchip"></i><span class="link-text">Tech Hubs</span></a></li>
            <li><a href="space.html"><i class="fas fa-satellite"></i><span class="link-text">Aerospace</span></a></li>
            <li><a href="fintech.html"><i class="fas fa-mobile-alt"></i><span class="link-text">FinTech</span></a></li>
        </ul>
    </nav>

    <main class="panel">
        <h2 style="color: white; margin-top: 30px; font-size: 1.5rem; text-shadow: 2px 2px 4px #000;">Tech & Innovation Ethiopia</h2>
        <div class="cards-container" id="cardsGrid"></div>
    </main>

    <script>
        const techData = [
            { name: "Entoto Observatory", cat: "Aerospace", desc: "Ethiopia's first space observatory and research center for astronomy." },
            { name: "Telebirr", cat: "FinTech", desc: "The mobile money giant revolutionizing digital payments in Ethiopia." },
            { name: "Ethio ICT Village", cat: "Infrastructure", desc: "A world-class tech park designed for hardware and software R&D." },
            { name: "IceAddis", cat: "Incubator", desc: "Ethiopia's first innovation hub for tech startups and creators." },
            { name: "Adama Science Park", cat: "Innovation", desc: "Connecting university research with industrial manufacturing." },
            { name: "Gebeya", cat: "EdTech", desc: "SaaS-enabled marketplace training the next generation of African developers." },
            { name: "Ride", cat: "Mobility", desc: "Ethiopia's premier ride-hailing app, driving urban transport innovation." },
            { name: "Chapa", cat: "FinTech", desc: "Online payment gateway helping businesses accept payments globally." },
            { name: "ETRSS-1", cat: "Space", desc: "Ethiopia's first remote sensing satellite launched for resource monitoring." },
            { name: "iCog Labs", cat: "Artificial Intelligence", desc: "Leading AI research lab focusing on humanoid robotics and AGI." },
            { name: "Kifiya", cat: "FinTech", desc: "Digital services provider focused on financial inclusion and e-gov." },
            { name: "BlueMoon", cat: "AgriTech", desc: "Youth-focused incubator for innovative agribusiness startups." },
            { name: "Feres", cat: "Logistics", desc: "Hyper-growth transport and delivery platform using AI for routing." },
            { name: "CBE Birr", cat: "Banking Tech", desc: "The mobile banking solution of Ethiopia's largest commercial bank." },
            { name: "Abe Kobo", cat: "E-Commerce", desc: "Pioneering the online marketplace for consumer goods in Addis." },
            { name: "ZayRide", cat: "Transport", desc: "Regional ride-hailing expansion and smart logistics services." },
            { name: "Orbit Health", cat: "HealthTech", desc: "Digital health records and hospital management software solutions." },
            { name: "Bole Lemi IP", cat: "Industry 4.0", desc: "Specialized industrial park focusing on high-tech exports." },
            { name: "AppDiv", cat: "Software", desc: "A top software house building enterprise apps for global clients." },
            { name: "Shega", cat: "Tech Media", desc: "Data-driven media house tracking the Ethiopian innovation economy." },
            { name: "Taskmoby", cat: "Service Tech", desc: "On-demand platform connecting users with skilled local services." },
            { name: "SantimPay", cat: "FinTech", desc: "Modern payment terminal and online gateway solutions." },
            { name: "ET-SMART-RSS", cat: "Satellite", desc: "The 2020 nano-satellite project for spatial data collection." },
            { name: "Ethio-China Center", cat: "Tech Diplomacy", desc: "Collaborative research center for satellite and high-tech transfer." },
            { name: "Safaricom Ethiopia", cat: "Telecom", desc: "Driving 5G rollout and modern digital infrastructure." },
            { name: "ArifPay", cat: "FinTech", desc: "Mobile point of sale (mPOS) solution for small merchants." },
            { name: "1888 EC", cat: "Startup Studio", desc: "A venture builder focused on scalable digital products." },
            { name: "Ahun", cat: "AdTech", desc: "The go-to platform for events and digital marketing discovery." },
            { name: "SunTransfer", cat: "GreenTech", desc: "Solar energy technology provider for off-grid rural communities." },
            { name: "BeU Delivery", cat: "FoodTech", desc: "Fastest-growing food delivery service using smart logistics." },
            { name: "EnePay", cat: "Finance", desc: "Unified payment system for government and utility services." },
            { name: "MinT", cat: "GovTech", desc: "Ministry of Innovation and Technology's digital transformation agency." },
            { name: "Kubik", cat: "ClimateTech", desc: "Turning plastic waste into low-carbon building materials." },
            { name: "Across Express", cat: "Logistics", desc: "Digitizing the truck-booking and heavy freight industry." },
            { name: "Medaki", cat: "Biotech", desc: "Startups focusing on medical device local manufacturing." },
            { name: "GoodayOn", cat: "Gig Economy", desc: "Connecting thousands of daily workers with jobs via mobile." },
            { name: "Fano Tech", cat: "Hardware", desc: "Focusing on local computer and tablet assembly." },
            { name: "Guzo", cat: "TravelTech", desc: "Online ticketing and booking engine for Ethiopian transport." },
            { name: "CashGo", cat: "Remittance", desc: "Digital platform for safe money transfers from the diaspora." },
            { name: "YeneHealth", cat: "FemTech", desc: "Confidential digital healthcare platform for Ethiopian women." },
            { name: "AfroCoding", cat: "EdTech", desc: "Teaching young Ethiopians to build the world through code." },
            { name: "Pick Pick", cat: "Agri-logistics", desc: "Direct farmer-to-consumer tech supply chain." },
            { name: "Negarit", cat: "LegalTech", desc: "Digitized repository of Ethiopian laws and proclamations." },
            { name: "Yager", cat: "CyberSecurity", desc: "Local firm defending Ethiopian digital infrastructure." },
            { name: "Garad", cat: "Blockchain", desc: "Exploring decentralized ledger tech for local governance." },
            { name: "EthioTrack", cat: "IoT", desc: "Smart GPS tracking and fleet management systems." },
            { name: "ZulePay", cat: "Wallet", desc: "Social payment app for bill splitting and gifting." },
            { name: "Kegna Tech", cat: "Engineering", desc: "Focused on renewable energy and water pump tech." },
            { name: "E-Birr", cat: "M-Commerce", desc: "Integration of banking with retail e-commerce." },
            { name: "StartUp Ethiopia", cat: "Ecosystem", desc: "National policy framework for innovation and growth." }
        ];

        const grid = document.getElementById('cardsGrid');
        const overlay = document.getElementById('regOverlay');
        const successBox = document.getElementById('success-msg');

        techData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'info-card';
            card.innerHTML = `
                <div>
                    <div class="category-tag">${item.cat}</div>
                    <h3>${item.name}</h3>
                    <div class="short-desc">${item.desc}</div>
                </div>
                <button class="explore-btn-card" onclick="openRegistration('${item.name}')">Innovate Now</button>
            `;
            grid.appendChild(card);
        });

        function openRegistration(name) {
            document.getElementById('regTitle').innerText = "Inquiry for " + name;
            overlay.style.display = 'flex';
        }

        function handleRegister() {
            successBox.innerText = "Request Sent! Our Innovation Team will contact you.";
            successBox.style.display = 'block';
            setTimeout(() => {
                overlay.style.display = 'none';
                successBox.style.display = 'none';
            }, 1500);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }, 1000);
        });
    </script>
</body>
</html>
