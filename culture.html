    <div class="ai-chat-wrapper">
        <div class="chat-toggle" onclick="toggleChat()"><i class="fa-solid fa-robot"></i></div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header"><span>Culture AI Guide</span></div>
            <div class="chat-content" id="chatContent">
                <div class="ai-msg">Ask me about Ethiopian Culture!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Ask AI..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500);
            }, 1500);
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatContent = document.getElementById('chatContent');
            if (!input.value.trim()) return;

            chatContent.innerHTML += `<div class="user-msg" style="text-align:right; margin:10px; color:#2e7d32; font-weight:bold;">You: ${input.value}</div>`;
            const msg = input.value; input.value = '';

            try {
                const response = await fetch('https://shiny-dollop-x5gxg6gw49g43645p-3000.app.github.dev/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();
                chatContent.innerHTML += `<div class="ai-msg">${data.reply}</div>`;
            } catch (error) {
                chatContent.innerHTML += `<div class="ai-msg">Error connecting to AI.</div>`;
            }
            chatContent.scrollTop = chatContent.scrollHeight;
        }
    </script>
