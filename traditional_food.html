<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Traditional Cuisine - EthioTravel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --accent: #ffca28; --glass: rgba(255, 255, 255, 0.1); }
        
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        /* SIDEBAR WITH LOCATION-MATCHING GRADIENT */
        #sidebar { 
            z-index: 2000; 
            transition: 0.5s; 
            width: 180px; 
            position: fixed; 
            left: 0; 
            top: 0; 
            height: 100vh; 
            background: linear-gradient(to bottom, #008844, #ffcc00, #ee334e); 
        }
        #sidebar.collapsed { width: 70px; }
        .nav-links { list-style: none; padding: 60px 0 0 0; margin: 0; }
        .nav-links li a { display: flex; align-items: center; padding: 15px 25px; color: #000; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-links li a:hover { background: rgba(0,0,0,0.1); }
        .link-text { margin-left: 20px; transition: 0.3s; }
        #sidebar.collapsed .link-text { opacity: 0; pointer-events: none; }
        .toggle-btn { position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 1.5rem; color: #000; }

        /* MAIN LAYOUT */
        .content-wrapper { 
            margin-left: 250px; 
            height: 100vh; 
            transition: 0.5s ease; 
            display: flex; 
            flex-direction: column;
            background: #000;
        }
        #sidebar.collapsed ~ .content-wrapper { margin-left: 70px; }

        /* SEARCH BAR */
        .header-tools { 
            padding: 20px; 
            background: rgba(0,0,0,0.9); 
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .search-box { width: 90%; max-width: 600px; position: relative; }
        .search-box input {
            width: 100%;
            padding: 12px 45px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        .search-box i { position: absolute; left: 20px; top: 15px; color: var(--accent); }

        /* GRID: FIXED 4 CARDS PER SCREEN (2x2) */
        .food-grid {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: calc(45vh - 40px); /* Adjusts to fit 2 rows perfectly */
            gap: 20px;
            scroll-snap-type: y mandatory;
        }

        .food-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            scroll-snap-align: start;
            transition: 0.3s;
        }
        .food-card:hover { border-color: var(--accent); transform: scale(1.02); }

        .food-img { width: 70; height: 100%; object-fit: cover; }
        .food-info { padding: 25px; width: 55%; display: flex; flex-direction: column; justify-content: space-between; }
        .food-info h3 { color: var(--accent); margin: 0; text-transform: uppercase; font-size: 1.2rem; }
        .food-info p { font-size: 0.85rem; opacity: 0.8; margin: 5px 0; }
        
        .order-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* FORM OVERLAY */
        .form-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .beu-form {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--accent);
            text-align: center;
        }
        .beu-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #333; border: none; color: white; border-radius: 8px;
        }

        /* AI CHAT */
        .chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2500; }
        .chat-window { position: fixed; bottom: 80px; right: 20px; width: 300px; height: 400px; background: #1a1a1a; border-radius: 15px; border: 1px solid var(--primary); display: none; flex-direction: column; z-index: 2500; }
        .chat-window.active { display: flex; }

        @media (max-width: 768px) {
            .food-grid { grid-template-columns: 1fr; grid-auto-rows: calc(45vh - 30px); }
            .content-wrapper { margin-left: 0; }
            #sidebar { left: -250px; }
            #sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar collapsed" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="culture.html"><i class="fas fa-users"></i><span class="link-text">Culture</span></a></li>
            <li><a href="history.html"><i class="fas fa-monument"></i><span class="link-text">History</span></a></li>
            <li><a href="land.html"><i class="fas fa-mountain"></i><span class="link-text">Land</span></a></li>
            <li><a href="animal.html"><i class="fas fa-hippo"></i><span class="link-text">Animals</span></a></li>
            <li><a href="hotel.html"><i class="fas fa-hotel"></i><span class="link-text">Hotels</span></a></li>
            <li><a href="geography.html"><i class="fas fa-globe-africa"></i><span class="link-text">Geography</span></a></li>

            <li><a href="emergency.html"><i class="fas fa-phone"></i><span class="link-text">Emergency</span></a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <header class="header-tools">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="foodSearch" placeholder="Search traditional foods..." onkeyup="filterFood()">
            </div>
        </header>

        <main class="food-grid" id="foodGrid"></main>
    </div>

    <div class="form-overlay" id="formOverlay">
        <div class="beu-form">
            <h2 style="color:var(--accent)">BeU Delivery</h2>
            <p id="foodItem" style="color:white"></p>
            <form onsubmit="submitOrder(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Phone" required>
                <input type="text" placeholder="Address" required>
                <button type="submit" class="order-btn" style="width:100%">Confirm</button>
            </form>
            <div id="successMsg" style="display:none; color:#4caf50; margin-top:15px; font-weight:bold;">Thank you! It will be there soon!</div>
        </div>
    </div>

    <div class="chat-toggle" onclick="toggleChat()"><i class="fa-solid fa-robot" style="color:white"></i></div>
    <div class="chat-window" id="chatWindow">
        <div style="background:var(--primary); padding:15px;">Ethiopia AI Guide</div>
        <div id="chatContent" style="flex:1; padding:15px; overflow-y:auto;"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="userInput" style="flex:1; background:#333; color:white; border:none; padding:8px;">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; color:white; padding:5px;">Send</button>
        </div>
    </div>

        const grid = document.getElementById('foodGrid');
        [...foods, ...foods].forEach(food => {
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `<img src="${food.img}" class="food-img"><div class="food-info"><h3>${food.name}</h3><p>${food.ing}</p><button class="order-btn" onclick="openOrder('${food.name}')">ORDER NOW</button></div>`;
            grid.appendChild(card);
        });

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            if(window.innerWidth <= 768) sb.classList.toggle('active');
        }

        function filterFood() {
            const q = document.getElementById('foodSearch').value.toLowerCase();
            document.querySelectorAll('.food-card').forEach(c => {
                c.style.display = c.querySelector('h3').innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function openOrder(n) {
            document.getElementById('foodItem').innerText = "Ordering: " + n;
            document.getElementById('formOverlay').style.display = 'flex';
        }

        function submitOrder(e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('formOverlay').style.display = 'none';
                document.getElementById('successMsg').style.display = 'none';
            }, 1000);
        }

        function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
    </script>
