<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parks of Ethiopia | EthioTravel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ethio-green: #2e7d32;
            --ethio-yellow: #fcd116;
            --ethio-red: #f44336;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #050a05;
            color: white;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* --- UPDATED UNIFIED SIDEBAR --- */
        #sidebar { 
            z-index: 3000; 
            transition: 0.5s ease; 
            width: 250px; 
            position: fixed; 
            left: 0; top: 0; 
            height: 100vh; 
            background: linear-gradient(180deg, var(--ethio-green) 0%, var(--ethio-yellow) 50%, var(--ethio-red) 100%); 
        }

        #sidebar.collapsed { width: 70px; }
        
        .nav-links { list-style: none; padding: 80px 0 0 0; margin: 0; }
        
        .nav-links li a { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #000; text-decoration: none; font-weight: bold; transition: 0.3s; 
            white-space: nowrap;
        }
        
        .nav-links li a:hover { background: rgba(0,0,0,0.15); }
        
        .link-text { margin-left: 20px; transition: 0.3s; }
        
        #sidebar.collapsed .link-text { opacity: 0; pointer-events: none; }
        
        .toggle-btn { 
            position: absolute; top: 25px; left: 23px; 
            cursor: pointer; font-size: 1.5rem; color: #000; 
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 70px; /* Aligned with collapsed state by default */
            padding: 40px 20px;
            min-height: 100vh;
            transition: margin-left 0.5s ease;
        }

        /* Push content if sidebar starts expanded (optional) */
        /* #sidebar:not(.collapsed) ~ .main-content { margin-left: 250px; } */

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 2.8rem;
            color: var(--ethio-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- PARK GRID & CARDS --- */
        .park-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .park-card {
            position: relative;
            height: 400px;
            border-radius: 25px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .park-card.expanded {
            grid-column: 1 / -1;
            height: 750px; 
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 20%, rgba(0,0,0,0.95) 90%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            z-index: 5;
            transition: 0.4s;
        }

        .park-card.expanded .card-overlay {
            background: rgba(0,0,0,0.85);
            justify-content: flex-start; 
        }

        .description {
            display: none;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
            max-width: 800px;
        }

        .expanded .description { display: block; }

        .map-frame {
            display: none;
            width: 100%;
            height: 400px;
            margin: 20px 0;
            border-radius: 20px;
            border: 2px solid var(--ethio-green);
            overflow: hidden;
        }

        .map-active .map-frame { display: block; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px; 
        }

        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-explore { background: var(--ethio-yellow); color: black; }
        .btn-locate { background: var(--ethio-green); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .main-content { margin-left: 0 !important; }
            #sidebar { left: -250px; }
            #sidebar.active { left: 0; }
            .park-grid { grid-template-columns: 1fr; }
            .header-title h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav id="sidebar" class="collapsed">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="culture.html"><i class="fas fa-users"></i><span class="link-text">Culture</span></a></li>
            <li><a href="history.html"><i class="fas fa-monument"></i><span class="link-text">History</span></a></li>
            <li><a href="land.html"><i class="fas fa-mountain"></i><span class="link-text">Land</span></a></li>
            <li><a href="animal.html"><i class="fas fa-hippo"></i><span class="link-text">Animals</span></a></li>
            <li><a href="geography.html"><i class="fas fa-globe-africa"></i><span class="link-text">Geography</span></a></li>
            <li><a href="hotel.html"><i class="fas fa-hotel"></i><span class="link-text">Hotels</span></a></li>
            <li><a href="information.html"><i class="fas fa-info-circle"></i><span class="link-text">Info</span></a></li> 
            <li><a href="emergency.html"><i class="fas fa-phone-alt"></i><span class="link-text">Emergency</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="header-title">
            <h1>Parks & Nature</h1>
            <p style="color: #aaa; font-size: 1.2rem;">Experience Ethiopia's Untamed Beauty</p>
        </div>
        
        <div class="park-grid" id="parkGrid"></div>
    </div>

    <script>
        // Sidebar Toggle Logic
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            if (window.innerWidth <= 768) {
                sb.classList.toggle('active');
            }
        }

        const parks = [
            { name: "Simien Mountains", q: "Simien+Mountains+National+Park", img: "https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800", desc: "A UNESCO World Heritage site known for its dramatic mountain peaks and endemic species like the Walia Ibex and Gelada Baboons." },
            { name: "Bale Mountains", q: "Bale+Mountains+National+Park", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800", desc: "Home to the rare Ethiopian Wolf and the incredible Sanetti Plateau, the highest plateau in Africa." },
            { name: "Entoto Eco Park", q: "Entoto+Park+Addis+Ababa", img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=800", desc: "A modern eco-tourism hub located on the ridge overlooking Addis Ababa, offering ziplining, cycling, and panoramic views." },
            { name: "Unity Park", q: "Unity+Park+Addis+Ababa", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=800", desc: "Located within the National Palace, it features biological gardens, a zoo, and a walk through Ethiopia's royal history." },
            { name: "Nechisar Park", q: "Nechisar+National+Park", img: "https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=800", desc: "Located between Lakes Abaya and Chamo, known for the 'Bridge of God' and massive herds of zebras." },
            { name: "Awash National Park", q: "Awash+National+Park", img: "https://images.unsplash.com/photo-1549366021-9f761d450615?w=800", desc: "One of the oldest parks, famous for its dramatic waterfalls, volcanic landscapes, and diverse bird species." }
        ]; 

        function createCards() {
            const grid = document.getElementById('parkGrid');
            parks.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'park-card';
                card.style.backgroundImage = `url('${p.img}')`;
                card.innerHTML = `
                    <div class="card-overlay">
                        <h2>${p.name}</h2>
                        <div class="description">${p.desc}</div>
                        <div class="map-frame">
                            <iframe width="100%" height="100%" frameborder="0" 
                                src="https://maps.google.com/maps?q=${p.q}&t=&z=13&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-explore" onclick="toggleExplore(this)">Explore</button>
                            <button class="btn btn-locate" onclick="toggleLocate(this)">Locate</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleExplore(btn) {
            const card = btn.closest('.park-card');
            const isExpanded = card.classList.contains('expanded');
            
            document.querySelectorAll('.park-card').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded', 'map-active');
                    c.querySelector('.btn-explore').innerText = "Explore";
                }
            });

            if (!isExpanded) {
                card.classList.add('expanded');
                btn.innerText = "Close";
            } else {
                card.classList.remove('expanded', 'map-active');
                btn.innerText = "Explore";
            }
        }

        function toggleLocate(btn) {
            const card = btn.closest('.park-card');
            const isMapActive = card.classList.contains('map-active');
            
            if (isMapActive) {
                card.classList.remove('map-active', 'expanded');
                card.querySelector('.btn-explore').innerText = "Explore";
            } else {
                card.classList.add('expanded', 'map-active');
                card.querySelector('.btn-explore').innerText = "Close";
            }
        }

        window.onload = createCards;
    </script>
</body>
</html>
