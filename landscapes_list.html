<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscapes of Ethiopia | EthioTravel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ethio-green: #2e7d32;
            --ethio-yellow: #fcd116;
            --glass: rgba(255, 255, 255, 0.1);
            --sidebar-width: 80px;
        }

        body {
            background: #050a05;
            color: white;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 1000;
            border-right: 1px solid var(--glass);
        }

        .sidebar i {
            font-size: 22px;
            color: #888;
            margin: 25px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--ethio-yellow);
            transform: scale(1.1);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 2.8rem;
            color: var(--ethio-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- GRID --- */
        .park-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- CARD --- */
        .park-card {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .park-card.expanded {
            grid-column: span 2;
            height: 800px; 
        }

        /* --- OVERLAY & FLEX FIX --- */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 20%, rgba(0,0,0,0.9) 85%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            z-index: 5;
            transition: 0.4s;
        }

        .park-card.expanded .card-overlay {
            background: rgba(0,0,0,0.85);
            justify-content: flex-start; 
        }

        .description {
            display: none;
            margin: 15px 0;
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
        }

        .expanded .description { display: block; }

        /* --- MAP FRAME FIX --- */
        .map-frame {
            display: none;
            width: 100%;
            flex-grow: 1; 
            min-height: 350px;
            margin: 15px 0;
            border-radius: 15px;
            border: 2px solid var(--ethio-green);
            overflow: hidden;
        }

        .map-active .map-frame { display: block; }

        /* --- BUTTONS FIX --- */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: auto; 
            z-index: 10;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-explore { background: var(--ethio-yellow); color: black; }
        .btn-locate { background: var(--ethio-green); color: white; }

        /* --- CHAT --- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
        }
        .chat-btn {
            width: 60px; height: 60px;
            background: var(--ethio-yellow);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: black;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        @media (max-width: 850px) {
            .park-grid { grid-template-columns: 1fr; }
            .park-card.expanded { grid-column: span 1; }
            .main-content { margin-left: 0; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fas fa-home"></i>
        <i class="fas fa-mountain active"></i>
        <i class="fas fa-map-marked-alt"></i>
        <i class="fas fa-images"></i>
    </div>

    <div class="main-content">
        <div class="header-title">
            <h1>Ethiopian Landscapes</h1>
            <p style="color: #888;">Explore the Roof of Africa and Beyond</p>
        </div>
        
        <div class="park-grid" id="parkGrid"></div>
    </div>

    <div class="chat-widget">
        <div class="chat-btn"><i class="fas fa-leaf"></i></div>
    </div>

    <script>
        const parks = [
            { name: "Simien Mountains", q: "Simien+Mountains+National+Park", img: "https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800", desc: "The 'Roof of Africa,' home to jagged peaks and the endemic Walia Ibex." },
            { name: "Bale Mountains", q: "Bale+Mountains+National+Park", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800", desc: "A biodiversity hotspot featuring the Sanetti Plateau and the Ethiopian Wolf." },
            { name: "Entoto Mountains", q: "Entoto+Mountains+Addis+Ababa", img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=800", desc: "The historic gateway to Addis Ababa, offering panoramic city views." },
            { name: "Danakil Depression", q: "Danakil+Depression", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800", desc: "One of the hottest and lowest places on Earth, a surreal lunar landscape." },
            { name: "Erta Ale Volcano", q: "Erta+Ale+Volcano", img: "https://images.unsplash.com/photo-1502933691298-84fc14542831?w=800", desc: "Ethiopia's most active volcano, famous for its persistent lava lake." },
            { name: "Dallol", q: "Dallol+Ethiopia", img: "https://images.unsplash.com/photo-1589133486337-1e5b15b6999a?w=800", desc: "A hydrothermal field with vibrant neon colors formed by salt and sulfur." },
            { name: "Lake Tana", q: "Lake+Tana+Ethiopia", img: "https://images.unsplash.com/photo-1552684824-3f7435f68b37?w=800", desc: "The source of the Blue Nile and home to ancient island monasteries." },
            { name: "Blue Nile Falls", q: "Blue+Nile+Falls", img: "https://images.unsplash.com/photo-1543236357-11110756780c?w=800", desc: "Known as 'Tis Abay' (Great Smoke), these falls are a spectacular sight." },
            { name: "Lake Abaya", q: "Lake+Abaya+Ethiopia", img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800", desc: "A reddish-colored Rift Valley lake known for its crocodiles and hippos." },
            { name: "Lake Chamo", q: "Lake+Chamo+Arba+Minch", img: "https://images.unsplash.com/photo-1469474099711-423407983693?w=800", desc: "Famous for the 'crocodile market' where massive Nile crocodiles sunbathe." },
            { name: "Wenchi Crater Lake", q: "Wenchi+Crater+Lake", img: "https://images.unsplash.com/photo-1439853949127-fa647821eba0?w=800", desc: "A stunning alpine lake inside an extinct volcanic crater." },
            { name: "Great Rift Valley", q: "Great+Rift+Valley+Ethiopia", img: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800", desc: "A massive geological trench cutting through the heart of the country." },
            { name: "Omo Valley", q: "Omo+Valley+Ethiopia", img: "https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800", desc: "A culturally rich region where ancient traditions remain untouched." },
            { name: "Menagesha Suba Forest", q: "Menagesha+Suba+Forest", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800", desc: "Africa's first designated forest, rich in indigenous trees." },
            { name: "Harenna Forest", q: "Harenna+Forest+Bale", img: "https://images.unsplash.com/photo-1511497584788-876760111969?w=800", desc: "A misty, cloud-covered forest in the southern Bale Mountains." },
            { name: "Konso Terraces", q: "Konso+Cultural+Landscape", img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800", desc: "A UNESCO site showing spectacular ancient stone-walled terracing." },
            { name: "Tiya Stelae Field", q: "Tiya+Archaeological+Site", img: "https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?w=800", desc: "Ancient monolithic pillars marking a prehistoric burial site." }
        ];

        function createCards() {
            const grid = document.getElementById('parkGrid');
            parks.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'park-card';
                card.style.backgroundImage = `url('${p.img}')`;
                card.innerHTML = `
                    <div class="card-overlay">
                        <h2>${p.name}</h2>
                        <div class="description">${p.desc}</div>
                        <div class="map-frame">
                            <iframe width="100%" height="100%" frameborder="0" scrolling="no" 
                                src="https://maps.google.com/maps?q=${p.q}&t=&z=13&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-explore" onclick="toggleExplore(this)">Explore</button>
                            <button class="btn btn-locate" onclick="toggleLocate(this)">Locate</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleExplore(btn) {
            const card = btn.closest('.park-card');
            const isExpanded = card.classList.contains('expanded');
            
            document.querySelectorAll('.park-card').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded', 'map-active');
                    c.querySelector('.btn-explore').innerText = "Explore";
                }
            });

            if (!isExpanded) {
                card.classList.add('expanded');
                btn.innerText = "Close";
            } else {
                card.classList.remove('expanded', 'map-active');
                btn.innerText = "Explore";
            }
        }

        function toggleLocate(btn) {
            const card = btn.closest('.park-card');
            const isMapActive = card.classList.contains('map-active');
            
            if (isMapActive) {
                // CONTRACT: If locate is clicked again, close everything
                card.classList.remove('map-active', 'expanded');
                card.querySelector('.btn-explore').innerText = "Explore";
            } else {
                // EXPAND: Open card and map
                card.classList.add('expanded', 'map-active');
                card.querySelector('.btn-explore').innerText = "Close";
            }
        }

        window.onload = createCards;
    </script>
</body>
</html>
