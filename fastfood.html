<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fast Food Ethiopia - EthioTravel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --accent: #ffca28; --glass: rgba(255, 255, 255, 0.1); }
        
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { 
            z-index: 2000; 
            transition: 0.5s; 
            width: 180px; 
            position: fixed; 
            left: 0; 
            top: 0; 
            height: 100vh; 
            background: linear-gradient(to bottom, #008844, #ffcc00, #ee334e); 
        }
        #sidebar.collapsed { width: 70px; }
        .nav-links { list-style: none; padding: 60px 0 0 0; margin: 0; }
        .nav-links li a { display: flex; align-items: center; padding: 15px 25px; color: #000; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-links li a:hover { background: rgba(0,0,0,0.1); }
        .link-text { margin-left: 20px; transition: 0.3s; white-space: nowrap; }
        #sidebar.collapsed .link-text { opacity: 0; pointer-events: none; }
        .toggle-btn { position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 1.5rem; color: #000; }

        /* MAIN LAYOUT */
        .content-wrapper { 
            margin-left: 180px; 
            height: 100vh; 
            transition: 0.5s ease; 
            display: flex; 
            flex-direction: column;
            background: #000;
        }
        #sidebar.collapsed ~ .content-wrapper { margin-left: 70px; }

        /* HEADER */
        .header-tools { 
            padding: 20px; 
            background: rgba(0,0,0,0.9); 
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .search-box { width: 90%; max-width: 600px; position: relative; }
        .search-box input {
            width: 100%;
            padding: 12px 45px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        .search-box i { position: absolute; left: 20px; top: 15px; color: var(--accent); }

        /* GRID: 2x2 Layout */
        .food-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: calc(45vh - 30px);
            gap: 15px;
            scroll-snap-type: y mandatory;
        }

        .food-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            scroll-snap-align: start;
            transition: 0.3s;
        }
        .food-card:hover { border-color: var(--accent); }

        .food-img { width: 45%; height: 100%; object-fit: cover; }
        .food-info { padding: 15px; width: 55%; display: flex; flex-direction: column; justify-content: space-between; }
        .food-info h3 { color: var(--accent); margin: 0; text-transform: uppercase; font-size: 1rem; }
        .food-info p { font-size: 0.75rem; opacity: 0.8; margin: 5px 0; }
        
        .order-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 8px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* FORM OVERLAY */
        .form-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .beu-form {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            border: 2px solid var(--accent);
            text-align: center;
        }
        .beu-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #333; border: none; color: white; border-radius: 8px;
            box-sizing: border-box;
        }

        /* AI CHAT */
        .chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2500; }
        .chat-window { position: fixed; bottom: 80px; right: 20px; width: 280px; height: 350px; background: #1a1a1a; border-radius: 15px; border: 1px solid var(--primary); display: none; flex-direction: column; z-index: 2500; }
        .chat-window.active { display: flex; }

        @media (max-width: 768px) {
            .food-grid { grid-template-columns: 1fr; grid-auto-rows: calc(40vh); }
            .content-wrapper { margin-left: 0; }
            #sidebar { left: -180px; }
            #sidebar.active { left: 0; }
            #sidebar.collapsed ~ .content-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar collapsed" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="culture.html"><i class="fas fa-users"></i><span class="link-text">Culture</span></a></li>
            <li><a href="history.html"><i class="fas fa-monument"></i><span class="link-text">History</span></a></li>
            <li><a href="land.html"><i class="fas fa-mountain"></i><span class="link-text">Land</span></a></li>
            <li><a href="animal.html"><i class="fas fa-hippo"></i><span class="link-text">Animals</span></a></li>
            <li><a href="hotel.html"><i class="fas fa-hotel"></i><span class="link-text">Hotels</span></a></li>
            <li><a href="geography.html"><i class="fas fa-globe-africa"></i><span class="link-text">Geography</span></a></li>
            <li><a href="emergency.html"><i class="fas fa-phone"></i><span class="link-text">Emergency</span></a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <header class="header-tools">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="foodSearch" placeholder="Search Ethiopian Fast Food..." onkeyup="filterFood()">
            </div>
        </header>

        <main class="food-grid" id="foodGrid"></main>
    </div>

    <div class="form-overlay" id="formOverlay">
        <div class="beu-form">
            <h2 style="color:var(--accent)">BeU Delivery</h2>
            <p id="foodItem" style="color:white; margin-bottom: 20px;"></p>
            <form onsubmit="submitOrder(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Phone Number" required>
                <input type="text" placeholder="Delivery Address" required>
                <button type="submit" class="order-btn" style="width:100%; margin-top: 10px;">CONFIRM ORDER</button>
            </form>
            <div id="successMsg" style="display:none; color:#4caf50; margin-top:15px; font-weight:bold;">Order Sent! Arriving shortly.</div>
            <button onclick="closeOrder()" style="background:transparent; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div class="chat-toggle" onclick="toggleChat()"><i class="fa-solid fa-robot" style="color:white"></i></div>
    <div class="chat-window" id="chatWindow">
        <div style="background:var(--primary); padding:12px; font-weight:bold;">Food Guide AI</div>
        <div id="chatContent" style="flex:1; padding:15px; overflow-y:auto; font-size: 0.9rem;"></div>
        <div style="padding:10px; display:flex; border-top: 1px solid #333;">
            <input type="text" id="userInput" style="flex:1; background:#333; color:white; border:none; padding:8px; border-radius: 4px;">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; color:white; padding:5px 10px; margin-left:5px; border-radius: 4px;">Send</button>
        </div>
    </div>

    <script>
        const fastFoods = [
            { name: "Sambusa", ing: "Lentils/Meat, Spices, Pastry", img: "https://images.unsplash.com/photo-1601050633722-3f8d446b88bf?q=80&w=500" },
            { name: "Kolo", ing: "Roasted Barley, Peanuts, Chickpeas", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0Y6a_9NInlqE6E8pG4C1-J_0j6r9mB_H2Pw&s" },
            { name: "Fast Food Firfir", ing: "Injera, Berbere, Oil, Onion", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzR-Z7e9q0lO6N9N0-mX9O6t8LpA6w6S7A6A&s" },
            { name: "Beka (Street Meat)", ing: "Grilled Beef Cubes, Awaze", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSz5X-h8W-k_9Z7M-J9A6p9vR6r9M_h9M9M9A&s" },
            { name: "Fetira", ing: "Flaky Pastry, Egg, Honey/Salt", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe-P9q9M_h9M9M9A_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Chechebsa", ing: "Shredded Kitta, Berbere, Niter Kibbeh", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_h9M9M9A_Te-P9q9M_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Enkulal Firfir", ing: "Scrambled Eggs, Peppers, Onion", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_h9M9M9A_Te-P9q9M_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Special Ful", ing: "Fava Beans, Yogurt, Egg, Bun", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_h9M9M9A_Te-P9q9M_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Pasta Selata", ing: "Macaroni, Veggies, Dressing", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=500" },
            { name: "Beyaynetu (Fast)", ing: "Mixed Vegan Stews, Injera", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_h9M9M9A_Te-P9q9M_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Bonolino", ing: "Ethiopian Sweet Donut/Pastry", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_h9M9M9A_Te-P9q9M_9Z7M-J9A6p9vR6r9M&s" },
            { name: "Burgers (Addis Style)", ing: "Beef Patty, Local Spices, Veggies", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500" },
            { name: "Mus (Fried Banana)", ing: "Ripe Banana, Light Batter", img: "https://images.unsplash.com/photo-1599020792689-9f7902f58c4e?q=80&w=500" },
            { name: "Bread (Ambasha)", ing: "Traditional Spiced Large Bread", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe-P9q9M_9Z7M-J9A6p9vR6r9M_h9M9M9A&s" },
            { name: "Spris Juice", ing: "Layered Avocado, Mango, Papaya", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_h9M9M9A_9Z7M-J9A6p9vR6r9M_Te-P9q9M&s" }
        ];

        const grid = document.getElementById('foodGrid');
        
        function renderFoods(data) {
            grid.innerHTML = '';
            data.forEach(food => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <img src="${food.img}" class="food-img" alt="${food.name}">
                    <div class="food-info">
                        <div>
                            <h3>${food.name}</h3>
                            <p>${food.ing}</p>
                        </div>
                        <button class="order-btn" onclick="openOrder('${food.name}')">ORDER VIA BEU</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        renderFoods(fastFoods);

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            if(window.innerWidth <= 768) sb.classList.toggle('active');
        }

        function filterFood() {
            const q = document.getElementById('foodSearch').value.toLowerCase();
            const filtered = fastFoods.filter(f => f.name.toLowerCase().includes(q));
            renderFoods(filtered);
        }

        function openOrder(n) {
            document.getElementById('foodItem').innerText = "Item: " + n;
            document.getElementById('formOverlay').style.display = 'flex';
        }

        function closeOrder() {
            document.getElementById('formOverlay').style.display = 'none';
        }

        function submitOrder(e) {
            e.preventDefault();
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(() => {
                closeOrder();
                document.getElementById('successMsg').style.display = 'none';
            }, 2000);
        }

        function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const content = document.getElementById('chatContent');
            if(input.value.trim() !== "") {
                content.innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--accent)">You: ${input.value}</div>`;
                content.innerHTML += `<div style="margin-bottom:10px;">AI: Ethiopian street food is famous for being fresh and spicy! Try the Sambusa!</div>`;
                input.value = "";
                content.scrollTop = content.scrollHeight;
            }
        }
    </script>
</body>
</html>
