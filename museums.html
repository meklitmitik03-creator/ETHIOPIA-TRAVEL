        :root {
    --ethio-green: #2e7d32;
    --ethio-yellow: #fcd116;
    --ethio-red: #da121a;
    --glass: rgba(255, 255, 255, 0.1);
    --sidebar-width: 90px; /* Slightly wider for comfort */
}

body {
    background: #0a0a0a;
    color: white;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex; /* Helps align sidebar and content */
}

/* --- FIXED SIDEBAR --- */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100vh;
    width: var(--sidebar-width);
    /* Clean vertical gradient */
    background: linear-gradient(to bottom, var(--ethio-green), var(--ethio-yellow), var(--ethio-red));
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
    z-index: 1000;
    overflow-y: auto; /* Allows sidebar itself to scroll if many links are added */
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
}

.sidebar li {
    width: 100%;
    text-align: center;
    margin: 10px 0;
}

.sidebar a {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    transition: 0.3s;
}

.sidebar i {
    font-size: 22px;
    color: #000; /* Black icons against the bright flag colors */
    margin-bottom: 5px;
}

.sidebar .link-text {
    font-size: 10px;
    color: #000;
    font-weight: bold;
    text-transform: uppercase;
}

.sidebar a:hover {
    background: rgba(0,0,0,0.1);
    transform: scale(1.05);
}

/* --- MAIN CONTENT --- */
.main-content {
    margin-left: var(--sidebar-width); /* Pushes content so it's not under sidebar */
    width: calc(100% - var(--sidebar-width));
    padding: 40px;
    min-height: 100vh;
    box-sizing: border-box;
}

        body {
            background: #0a0a0a;
            color: white;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            /* Enable manual vertical scrolling */
            overflow-y: auto;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: linear-gradient(green,yellow,red);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 1000;
            border-right: 1px solid var(--glass);
        }

        .sidebar i {
            font-size: 22px;
            color: #000000;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--ethio-yellow);
            transform: scale(1.1);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 2.8rem;
            color: var(--ethio-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        /* --- MUSEUM GRID (2 COLUMNS) --- */
        .museum-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* --- MUSEUM CARD --- */
        .museum-card {
            position: relative;
            height: 380px;
            border-radius: 20px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Expand to full width when active */
        .museum-card.expanded {
            grid-column: span 2;
            height: 700px;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 30%, rgba(0,0,0,0.9) 90%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            z-index: 5;
            transition: background 0.4s;
        }

        .museum-card.map-active .card-overlay {
            background: rgba(0,0,0,0.8);
            justify-content: flex-start;
        }

        .museum-card h2 {
            margin: 0;
            font-size: 1.8rem;
            color: white;
        }

        .description {
            display: none;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
            color: #ddd;
            max-width: 800px;
        }

        .expanded .description { display: block; }

        /* --- MAP EMBED --- */
        .map-frame {
            display: none;
            width: 100%;
            height: 400px;
            margin-top: 20px;
            border-radius: 15px;
            border: 2px solid var(--ethio-green);
        }

        .map-active .map-frame { display: block; }

        /* --- BUTTONS --- */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-explore { background: var(--ethio-yellow); color: black; }
        .btn-locate { background: var(--ethio-green); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* --- CHAT BOX --- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            background: var(--ethio-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: black;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        @media (max-width: 850px) {
            .museum-grid { grid-template-columns: 1fr; }
            .museum-card.expanded { grid-column: span 1; }
            .main-content { margin-left: 0; padding-top: 80px; }
            .sidebar { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; bottom: 0; top: auto; }
            .sidebar i { margin: 0; }
        }
    </style>

        function createCards() {
            const grid = document.getElementById('museumGrid');
            museums.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'museum-card';
                card.style.backgroundImage = `url('${m.img}')`;
                card.innerHTML = `
                    <div class="card-overlay">
                        <h2>${m.name}</h2>
                        <div class="description">${m.desc}</div>
                        <div class="map-frame">
                            <iframe width="100%" height="100%" frameborder="0" 
                                src="https://maps.google.com/maps?q=${m.q}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-explore" onclick="toggleExplore(this)">Explore</button>
                            <button class="btn btn-locate" onclick="toggleLocate(this)">Locate</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleExplore(btn) {
            const card = btn.closest('.museum-card');
            const isExpanded = card.classList.contains('expanded');
            
            // Close other cards first (Optional, for better focus)
            document.querySelectorAll('.museum-card').forEach(c => {
                c.classList.remove('expanded', 'map-active');
                c.querySelector('.btn-explore').innerText = "Explore";
            });

            if (!isExpanded) {
                card.classList.add('expanded');
                btn.innerText = "Close";
            }
        }

        function toggleLocate(btn) {
            const card = btn.closest('.museum-card');
            
            // Ensure card is expanded first
            card.classList.add('expanded');
            card.querySelector('.btn-explore').innerText = "Close";
            
            // Toggle the map visibility
            card.classList.toggle('map-active');
        }

        window.onload = createCards;
    </script>
