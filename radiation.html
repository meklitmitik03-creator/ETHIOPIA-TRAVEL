<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - EthioTravel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .coming-soon-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Ethiopian Flag Colors Gradient */
            background: linear-gradient(180deg, #2e7d32 0%, #fcd116 50%, #f44336 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.5rem;
            margin-top: 10px;
            font-weight: 300;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .back-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
            background: #000;
            color: #fff;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <i class="fas fa-tools" style="font-size: 4rem; margin-bottom: 20px;"></i>
        <h1>Coming Soon</h1>
        <p>We are currently mapping this part of the journey.</p>
        <a href="geography.html" class="back-btn">Go Back</a>
    </div>

</body>
</html>
