<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0, user-scalable=no"> 
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Education & Youth Power - Ethiopia AI Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        .bg-slider {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slideBG 20s infinite;
            filter: brightness(0.4);
        }

        @keyframes slideBG {
            0%, 30% { background-image: url('https://media.gettyimages.com/id/513450813/photo/lecture-building-and-students-in-front-in-ethiopia.jpg?s=612x612&w=0&k=20&c=g1JyBezgNOjvI-9dJ1oOv23EUDwaJtuqP6yit6Y9-vw='); }
            33%, 63% { background-image: url('https://media.gettyimages.com/id/532190375/photo/beautiful-african-american-teen-girl-taking-notes-in-college-classroom.jpg?s=612x612&w=0&k=20&c=yL_rf5LwohMnfp5PqmcO91c-Y_kF9IMu7PDHUBNb6a8='); }
            66%, 100% { background-image: url('https://images.pexels.com/photos/32703317/pexels-photo-32703317.jpeg'); }
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: padding-left 0.3s ease;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 15px;
            width: 90%;
            max-width: 1100px;
            height: 85vh; 
            overflow-y: auto;
            scrollbar-width: none;
            margin: 0 auto;
        }

        .cards-container::-webkit-scrollbar { display: none; }

        .info-card {
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 35vh; 
        }

        .info-card h3 { margin: 0; color: #31db39; font-size: 1.4rem; text-transform: uppercase; }
        .info-card .category-tag { font-size: 0.75rem; color: #ffca28; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .info-card .short-desc { font-size: 0.9rem; font-weight: 400; margin-top: 5px; line-height: 1.4; }
        
        .explore-btn-card {
            background: #ffca28; 
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .explore-btn-card:hover { background: #ffd54f; }

        /* Form Overlay */
        .registration-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }

        .registration-form {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #31db39;
            width: 90%;
            max-width: 400px;
            color: white;
            text-align: center;
        }

        .registration-form input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #333; border: 1px solid #444;
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .submit-btn {
            background: #ffca28; color: black; border: none;
            padding: 15px; width: 100%; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        #sidebar:not(.collapsed) ~ main.panel { padding-left: 250px; }

        @media (max-width: 600px) {
            #sidebar:not(.collapsed) ~ main.panel { padding-left: 0; }
            .cards-container { grid-template-columns: 1fr; }
            .info-card { height: auto; min-height: 250px; }
        }
    </style>
</head>

<body>
    <div class="bg-slider"></div>

    <div class="registration-overlay" id="regOverlay">
        <div class="registration-form">
            <h2 id="regTitle">Academic Inquiry</h2>
            <input type="text" placeholder="Full Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="email" placeholder="Email Address" required>
            <input type="text" placeholder="Desired Field of Study" required>
            <button class="submit-btn" onclick="handleRegister()">SEND APPLICATION</button>
            <div id="success-msg" style="display:none; color:#31db39; margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#2e7d32; display:flex; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.5s;">
        <div style="text-align:center; color:white;">
            <h1 style="font-size: 3rem; margin:0;">🎓</h1>
            <p style="letter-spacing: 2px;">ETHIO-EDU AI</p>
        </div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="link-text">Home</span></a></li>
            <li><a href="economy.html"><i class="fas fa-chart-line"></i><span class="link-text">Economy</span></a></li>
            <li><a href="education.html"><i class="fas fa-graduation-cap"></i><span class="link-text">Education</span></a></li>
        </ul>
    </nav>

    <main class="panel">
        <h2 style="color: white; margin-top: 30px; font-size: 1.8rem; text-shadow: 2px 2px 4px #000;">Education & Youth Power</h2>
        <div class="cards-container" id="cardsGrid"></div>
    </main>

    <script>
        const eduData = [
            // 30 UNIVERSITIES
            { name: "Addis Ababa University", cat: "University", desc: "The oldest and largest higher learning institution in Ethiopia, a center of excellence." },
            { name: "Jimma University", cat: "University", desc: "Ranked as one of the best in East Africa, famous for Community Based Education." },
            { name: "Bahir Dar University", cat: "University", desc: "Located by Lake Tana, offering top-tier engineering and maritime programs." },
            { name: "Mekelle University", cat: "University", desc: "A leading research institution known for dryland agriculture and law." },
            { name: "Hawassa University", cat: "University", desc: "Premier institution for agriculture and natural resource management." },
            { name: "Haramaya University", cat: "University", desc: "Historical center for agricultural sciences and technology." },
            { name: "Gondar University", cat: "University", desc: "The pioneer in medical education and healthcare services in Ethiopia." },
            { name: "Arba Minch University", cat: "University", desc: "Specializes in water technology and hydraulic engineering." },
            { name: "Adama Science & Tech", cat: "University", desc: "Focused on bridging the gap between industry and academia through technology." },
            { name: "AASTU", cat: "University", desc: "Addis Ababa Science and Technology University - Hub for innovators." },
            { name: "Wollo University", cat: "University", desc: "Growing rapidly with strong programs in medicine and social sciences." },
            { name: "Dire Dawa University", cat: "University", desc: "The leading 'Home of Industry' university in the eastern region." },
            { name: "Jijiga University", cat: "University", desc: "Strategic institution promoting education in the Somali region." },
            { name: "Debre Berhan University", cat: "University", desc: "Known for its cool climate and strong engineering faculty." },
            { name: "Ambo University", cat: "University", desc: "Historic institution with diverse programs in science and humanities." },
            { name: "Dilla University", cat: "University", desc: "A hub for Gedeo heritage studies and teacher education." },
            { name: "Wollega University", cat: "University", desc: "Prominent institution in Western Ethiopia with multiple campuses." },
            { name: "Semera University", cat: "University", desc: "Crucial educational center located in the Afar region." },
            { name: "Assosa University", cat: "University", desc: "Serving the Benishangul-Gumuz region with quality education." },
            { name: "Gambella University", cat: "University", desc: "Fostering regional development through specialized research." },
            { name: "Bule Hora University", cat: "University", desc: "Rapidly expanding in the southern Oromia region." },
            { name: "Wachamo University", cat: "University", desc: "Located in Hosanna, known for its vibrant student community." },
            { name: "Wolaita Sodo University", cat: "University", desc: "Leading center for veterinary medicine and agriculture." },
            { name: "Mizan Tepi University", cat: "University", desc: "Deeply involved in forest-based agricultural research." },
            { name: "Debre Markos University", cat: "University", desc: "Key academic institution in the Gojjam area." },
            { name: "Mettu University", cat: "University", desc: "Focused on engineering and environmental sciences in the southwest." },
            { name: "Bonga University", cat: "University", desc: "Centered in the Kafa Zone, the birthplace of coffee." },
            { name: "Raya University", cat: "University", desc: "One of the newest fourth-generation universities in Tigray." },
            { name: "Selale University", cat: "University", desc: "Promoting dairy technology and agricultural productivity." },
            { name: "Werabe University", cat: "University", desc: "Academic hub for the Silte zone population." },

            // 10 PRIVATE SCHOOLS
            { name: "International Community School", cat: "Private School", desc: "Elite international curriculum serving the diplomatic community." },
            { name: "Sandford International", cat: "Private School", desc: "Historic British-style school with high academic standards." },
            { name: "School of Nations", cat: "Private School", desc: "Focused on moral leadership and academic excellence." },
            { name: "Lycée Français Guébré-Mariam", cat: "Private School", desc: "The center for French language and culture in Addis Ababa." },
            { name: "Fountain of Knowledge", cat: "Private School", desc: "Popular choice for high-quality domestic and international tracks." },
            { name: "Gibson School Systems", cat: "Private School", desc: "One of the largest private school chains in the country." },
            { name: "Greek Community School", cat: "Private School", desc: "Diverse environment with a long history in the capital." },
            { name: "Andinet International", cat: "Private School", desc: "Offers IB and Cambridge curriculums for global readiness." },
            { name: "Cambridge Academy", cat: "Private School", desc: "Focused on STEM and modern teaching methodologies." },
            { name: "Bingham Academy", cat: "Private School", desc: "Established school serving the international and missionary community." },

            // 10 PUBLIC SCHOOLS
            { name: "Menelik II School", cat: "Public School", desc: "The very first modern school in Ethiopia, established in 1908." },
            { name: "Black Lion Secondary", cat: "Public School", desc: "Prestigious public school known for producing top scientists." },
            { name: "Technical School (AAST)", cat: "Public School", desc: "Historic center for vocational and technical foundations." },
            { name: "Bole Secondary School", cat: "Public School", desc: "One of the most populated and active schools in Addis." },
            { name: "Shimeles Habte School", cat: "Public School", desc: "Renowned for its sports and academic history." },
            { name: "Abiyot Kirs School", cat: "Public School", desc: "A central public institution with a large alumni network." },
            { name: "Misrak Secondary", cat: "Public School", desc: "A pillar of the public education system in eastern Addis." },
            { name: "Entoto Amba", cat: "Public School", desc: "Located at the foot of Entoto, serving a large community." },
            { name: "Tikur Anbessa School", cat: "Public School", desc: "Highly competitive school linked to the medical faculty." },
            { name: "St. Joseph School (Public)", cat: "Public School", desc: "Though managed by brothers, it serves the public with excellence." },

            // 10 COLLEGES
            { name: "Unity University College", cat: "College", desc: "The first private institute to be awarded university status." },
            { name: "St. Mary's University", cat: "College", desc: "Leader in distance learning and business education." },
            { name: "MicroLink IT College", cat: "College", desc: "Pioneer in computer science and software engineering." },
            { name: "Admas University", cat: "College", desc: "Providing accessible education across Ethiopia and beyond." },
            { name: "CPU College", cat: "College", desc: "Highly respected for Information Technology and Accounting." },
            { name: "Hope University College", cat: "College", desc: "Focused on architectural and liberal arts education." },
            { name: "Rift Valley University", cat: "College", desc: "The largest private institution by campus count in Ethiopia." },
            { name: "Alpha University College", cat: "College", desc: "Specializes in leadership, law, and distance education." },
            { name: "Infolink College", cat: "College", desc: "Known for technology-driven programs in Hawassa and Addis." },
            { name: "Hilcoe IT College", cat: "College", desc: "A specialized institution for high-end software development." }
        ];

        const grid = document.getElementById('cardsGrid');
        const overlay = document.getElementById('regOverlay');
        const successBox = document.getElementById('success-msg');

        eduData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'info-card';
            card.innerHTML = `
                <div>
                    <div class="category-tag">${item.cat}</div>
                    <h3>${item.name}</h3>
                    <div class="short-desc">${item.desc}</div>
                </div>
                <button class="explore-btn-card" onclick="openRegistration('${item.name}')">Join Program</button>
            `;
            grid.appendChild(card);
        });

        function openRegistration(name) {
            document.getElementById('regTitle').innerText = "Apply to " + name;
            overlay.style.display = 'flex';
        }

        function handleRegister() {
            successBox.innerText = "Application Sent! Checking status...";
            successBox.style.display = 'block';
            setTimeout(() => {
                overlay.style.display = 'none';
                successBox.style.display = 'none';
            }, 1500);
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('collapsed'); 
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }, 1000);
        });
    </script>
</body>
</html>
